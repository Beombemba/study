<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ATP CBT - Study Group</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0D13;--sf:#13161F;--raised:#1A1E2C;--card:#181C2A;--bd:#232840;--bda:#4E6AE6;--pri:#4E6AE6;--prig:rgba(78,106,230,.22);--prim:rgba(78,106,230,.10);--acc:#7C5CFC;--ok:#2DD4A0;--okm:rgba(45,212,160,.10);--bad:#F06464;--badm:rgba(240,100,100,.10);--warn:#F5B731;--warnm:rgba(245,183,49,.10);--t:#E6E9F0;--t2:#848BA2;--t3:#4E5468;--fn:'Noto Sans KR',-apple-system,sans-serif;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}body{font-family:var(--fn);background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer;border:none;background:none;color:inherit}input,textarea,select{font-family:var(--fn)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .35s ease both}.si{animation:scaleIn .3s ease both}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:12px;font-size:15px;font-weight:700;transition:all .15s;touch-action:manipulation}
.bp{background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;box-shadow:0 4px 24px var(--prig)}
.bg{background:var(--ok);color:#fff}.bgh{background:var(--raised);color:var(--t2);border:1px solid var(--bd)}
.btn:disabled{opacity:.35;pointer-events:none}
.tabs{display:flex;gap:4px;background:var(--sf);padding:4px;border-radius:12px}
.tab{flex:1;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;color:var(--t3);transition:all .15s}.tab.on{background:var(--pri);color:#fff}
.inp{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--card);color:var(--t);font-size:15px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--pri)}
.err{margin-top:10px;padding:10px 14px;background:var(--badm);border-radius:10px;color:var(--bad);font-size:13px;font-weight:600;display:none}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
/*
 ╔═══════════════════════════════════════════════════╗
 ║  ATP CBT v4 - Scalable + Private Login            ║
 ║                                                   ║
 ║  Firestore:                                       ║
 ║  /app/members → {list:[{id,pw},...]}              ║
 ║  /quizzes/{id} → {title,count,order}              ║
 ║  /quizzes/{id}/chunks/{n} → {questions:[...]}     ║
 ║  /users/{userId} → {history,sessions,wrongs,stars} ║
 ║                                                   ║
 ║  wrongs: {quizId_qIdx: true} → 정답 맞히면 삭제   ║
 ║  stars:  {quizId_qIdx: true} → 토글               ║
 ╚═══════════════════════════════════════════════════╝
*/
firebase.initializeApp({
  apiKey:"AIzaSyARciB7XP6ubjHdQkwBEKXI0-wsvbUeY-s",authDomain:"study-11efd.firebaseapp.com",
  projectId:"study-11efd",storageBucket:"study-11efd.firebasestorage.app",
  messagingSenderId:"967371236328",appId:"1:967371236328:web:d8ea1c12335b35928bfa5d"
});
const db=firebase.firestore(), ADMIN_KEY="rpj7646", CHUNK=200;

// ═══ LOCAL CACHE ═══
const LC={
  get(k){try{return JSON.parse(localStorage.getItem('v4_'+k))}catch{return null}},
  set(k,v){try{localStorage.setItem('v4_'+k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem('v4_'+k)}catch{}}
};
let currentUser=LC.get('currentUser')||null;

// ═══ DATA LAYER ═══
async function loadMembers(){
  try{const s=await db.collection('app').doc('members').get();if(s.exists&&s.data().list){LC.set('members',s.data().list);return s.data().list}}catch(e){console.warn(e)}
  return LC.get('members')||[];
}
async function saveMembers(m){LC.set('members',m);try{await db.collection('app').doc('members').set({list:m})}catch(e){console.warn(e)}}
function membersLocal(){return LC.get('members')||[]}

// Quizzes (shared, chunked)
async function loadQuizList(){
  try{
    let s;
    try { s=await db.collection('quizzes').orderBy('order').get(); }
    catch(e) { s=await db.collection('quizzes').get(); } // fallback without order
    const l=s.docs.map(d=>({id:d.id,title:d.data().title,count:d.data().count||0,order:d.data().order||0}));
    l.sort((a,b)=>a.order-b.order);
    LC.set('quizList',l);return l;
  }catch(e){console.warn(e)}
  return LC.get('quizList')||[];
}
function quizListLocal(){return LC.get('quizList')||[]}

async function loadQuizQ(qid){
  const c=LC.get('qz_'+qid);if(c)return c;
  try{const s=await db.collection('quizzes').doc(qid).collection('chunks').orderBy(firebase.firestore.FieldPath.documentId()).get();let qs=[];s.docs.forEach(d=>{if(d.data().questions)qs=qs.concat(d.data().questions)});LC.set('qz_'+qid,qs);return qs}catch(e){console.warn(e)}
  return[];
}
async function saveQuiz(title,questions){
  const id='q_'+Date.now(),list=quizListLocal(),order=list.length;
  try{await db.collection('quizzes').doc(id).set({title,count:questions.length,order});
  for(let i=0;i<questions.length;i+=CHUNK){await db.collection('quizzes').doc(id).collection('chunks').doc(String(Math.floor(i/CHUNK))).set({questions:questions.slice(i,i+CHUNK)})}
  LC.set('qz_'+id,questions);list.push({id,title,count:questions.length,order});LC.set('quizList',list);return true}catch(e){console.error(e);return false}
}
async function deleteQuiz(qid){
  try{const cs=await db.collection('quizzes').doc(qid).collection('chunks').get();const b=db.batch();cs.docs.forEach(d=>b.delete(d.ref));b.delete(db.collection('quizzes').doc(qid));await b.commit();LC.del('qz_'+qid);LC.set('quizList',quizListLocal().filter(q=>q.id!==qid));return true}catch(e){console.error(e);return false}
}
async function updateQuiz(qid,title,questions){
  try{
    // Delete old chunks
    const cs=await db.collection('quizzes').doc(qid).collection('chunks').get();
    const b=db.batch();cs.docs.forEach(d=>b.delete(d.ref));await b.commit();
    // Write new data
    await db.collection('quizzes').doc(qid).set({title,count:questions.length,order:quizListLocal().find(q=>q.id===qid)?.order||0});
    for(let i=0;i<questions.length;i+=CHUNK){await db.collection('quizzes').doc(qid).collection('chunks').doc(String(Math.floor(i/CHUNK))).set({questions:questions.slice(i,i+CHUNK)})}
    LC.set('qz_'+qid,questions);
    const list=quizListLocal().map(q=>q.id===qid?{...q,title,count:questions.length}:q);
    LC.set('quizList',list);return true;
  }catch(e){console.error(e);return false}
}

// User data
async function loadUserData(){
  if(!currentUser)return;
  try{const s=await db.collection('users').doc(currentUser).get();if(s.exists){const d=s.data();
  if(d.history)LC.set('u_'+currentUser+'_hist',d.history);
  if(d.sessions)LC.set('u_'+currentUser+'_sess',d.sessions);
  if(d.wrongs)LC.set('u_'+currentUser+'_wrongs',d.wrongs);
  if(d.stars)LC.set('u_'+currentUser+'_stars',d.stars);
  }}catch(e){console.warn(e)}
}
function uHist(){return LC.get('u_'+currentUser+'_hist')||[]}
function uSess(){return LC.get('u_'+currentUser+'_sess')||{}}
function uWrongs(){return LC.get('u_'+currentUser+'_wrongs')||{}}
function uStars(){return LC.get('u_'+currentUser+'_stars')||{}}

async function saveU(field,val){
  LC.set('u_'+currentUser+'_'+field,val);
  const key={hist:'history',sess:'sessions',wrongs:'wrongs',stars:'stars'}[field]||field;
  try{await db.collection('users').doc(currentUser).set({[key]:val},{merge:true})}catch(e){console.warn(e)}
}

// ═══ STATE ═══
let S={screen:'loading',quiz:null,quizId:null,cur:0,answers:{},marks:new Set(),checked:new Set(),timer:0,timerOn:false,timerRef:null,mode:'normal',homeTab:'list',shuffleOrder:null};
function startTimer(){S.timerOn=true;S.timerRef=setInterval(()=>{S.timer++;const e=document.querySelector('#tmr');if(e)e.textContent=fmt(S.timer)},1000)}
function stopTimer(){S.timerOn=false;clearInterval(S.timerRef)}
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]]}return r}

async function saveSess(){
  if(!S.quiz)return;const ss=uSess();
  ss[S.quizId]={cur:S.cur,answers:{...S.answers},marks:[...S.marks],checked:[...S.checked],timer:S.timer,shuffleOrder:S.shuffleOrder,date:Date.now()};
  await saveU('sess',ss);
}
function loadSess(qid){return uSess()[qid]||null}
async function clearSess(qid){const ss=uSess();delete ss[qid];await saveU('sess',ss)}

setInterval(()=>{if(S.screen==='quiz')saveSess()},15000);
document.addEventListener('visibilitychange',()=>{if(document.hidden&&S.screen==='quiz')saveSess()});

const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);

function R(){
  const a=$('#app');
  if(!currentUser&&S.screen!=='admin'&&S.screen!=='loading')S.screen='auth';
  try{
    switch(S.screen){
      case'loading':a.innerHTML=loadingHTML();break;
      case'auth':a.innerHTML=authHTML();bindAuth();break;
      case'admin':a.innerHTML=adminHTML();bindAdmin();break;
      case'home':a.innerHTML=homeHTML();bindHome();break;
      case'quiz':a.innerHTML=quizHTML();bindQuiz();break;
    }
  }catch(e){
    console.error('Render error:',e);
    a.innerHTML='<div style="padding:40px;text-align:center;color:var(--bad)"><h2>렌더링 오류</h2><p style="margin:10px 0;color:var(--t2);font-size:13px">'+e.message+'</p><button onclick="localStorage.clear();location.reload()" class="btn bgh" style="margin-top:16px">🔄 초기화 후 새로고침</button></div>';
  }
}

// ═══ LOADING ═══
function loadingHTML(){
  return`<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
    <div style="display:inline-flex;align-items:center;gap:10px;background:var(--prim);padding:10px 22px;border-radius:50px">
      <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff">Q</div>
      <span style="font-weight:900;font-size:19px">ATP CBT</span></div>
    <div><span class="loader"></span><span style="color:var(--t2);font-size:13px;margin-left:8px">로딩 중...</span></div></div>`;
}

// ═══ AUTH (아이디 + 비번 직접 입력) ═══
function authHTML(){
  return`<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="width:100%;max-width:400px">
    <div class="si" style="text-align:center;margin-bottom:32px">
      <div style="display:inline-flex;align-items:center;gap:10px;background:var(--prim);padding:10px 22px;border-radius:50px;margin-bottom:18px">
        <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff">Q</div>
        <span style="font-weight:900;font-size:19px">ATP CBT</span></div>
      <h1 style="font-size:24px;font-weight:900;margin-bottom:6px">로그인</h1>
      <p style="color:var(--t2);font-size:13px">아이디와 비밀번호를 입력하세요</p></div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      <input id="login-id" class="inp" placeholder="아이디" autocomplete="username">
      <input id="login-pw" class="inp" type="password" placeholder="비밀번호" autocomplete="current-password">
      <div id="login-err" class="err"></div>
      <button id="login-btn" class="btn bp" style="width:100%;padding:14px;font-size:15px">로그인</button></div>
    <button id="btn-admin" class="btn bgh" style="width:100%;padding:12px;font-size:13px">🔧 관리자</button>
    <div id="admin-modal" style="display:none;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-top:12px">
      <div style="font-weight:800;font-size:15px;margin-bottom:12px">관리자 비밀번호</div>
      <input id="admin-pw" class="inp" type="password" placeholder="비밀번호 입력">
      <div id="admin-err" class="err"></div>
      <div style="display:flex;gap:8px;margin-top:12px"><button id="admin-cancel" class="btn bgh" style="flex:1;font-size:13px">취소</button><button id="admin-go" class="btn bp" style="flex:1;font-size:13px">확인</button></div>
    </div>
  </div></div>`;
}
function bindAuth(){
  const doLogin=async()=>{
    const id=$('#login-id').value.trim(),pw=$('#login-pw').value,err=$('#login-err');
    err.style.display='none';
    if(!id||!pw){err.textContent='아이디와 비밀번호를 입력하세요';err.style.display='block';return}
    const ms=membersLocal(),m=ms.find(x=>(x.id||x.name)===id);
    if(!m){err.textContent='존재하지 않는 아이디입니다';err.style.display='block';return}
    if(m.pw!==pw){err.textContent='비밀번호가 틀렸습니다';err.style.display='block';return}
    currentUser=id;LC.set('currentUser',currentUser);
    await loadUserData();S.screen='home';R();
  };
  $('#login-btn').onclick=doLogin;
  $('#login-pw').onkeydown=e=>{if(e.key==='Enter')doLogin()};
  $('#login-id').onkeydown=e=>{if(e.key==='Enter')$('#login-pw').focus()};
  $('#btn-admin').onclick=()=>{$('#admin-modal').style.display='block';$('#admin-pw').value='';$('#admin-err').style.display='none';setTimeout(()=>$('#admin-pw').focus(),100)};
  $('#admin-cancel').onclick=()=>{$('#admin-modal').style.display='none'};
  $('#admin-go').onclick=()=>{
    const pw=$('#admin-pw').value.trim();
    if(pw===ADMIN_KEY||pw==='admin'){$('#admin-modal').style.display='none';S.screen='admin';R()}
    else{$('#admin-err').textContent='비밀번호 오류 (입력: '+pw.length+'자)';$('#admin-err').style.display='block'}
  };
  $('#admin-pw').onkeydown=e=>{if(e.key==='Enter')$('#admin-go').click()};
}

// ═══ ADMIN ═══
function adminHTML(){
  const members=membersLocal(),quizzes=quizListLocal();
  const mHTML=members.length?members.map((m,i)=>{
    const mid=m.id||m.name||'?';
    return`<div class="fu" style="animation-delay:${i*.03}s;display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--prim);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--pri)">${mid[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:14px">${mid}</div><div style="color:var(--t3);font-size:11px">PW: ${m.pw||'미설정'}</div></div>
      <button class="del-m" data-idx="${i}" style="padding:6px 10px;border-radius:7px;background:var(--badm);color:var(--bad);font-size:11px;font-weight:600">삭제</button></div>`}
  ).join(''):'<div style="text-align:center;padding:30px;color:var(--t3)">멤버 없음</div>';
  const qHTML=quizzes.length?quizzes.map((q,i)=>
    `<div class="fu" style="animation-delay:${i*.03}s;display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--raised);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px">
      <div style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${q.title} <span style="color:var(--t3);font-size:11px">(${q.count}문제)</span></div>
      <button class="del-quiz" data-id="${q.id}" style="padding:5px 10px;border-radius:7px;background:var(--badm);color:var(--bad);font-size:11px;font-weight:600">삭제</button></div>`
  ).join(''):'<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">문제집 없음</div>';

  return`<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="width:100%;max-width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:900">🔧 관리자</h2>
      <button id="adm-back" class="btn bgh" style="padding:8px 14px;font-size:12px">← 돌아가기</button></div>
    <div style="margin-bottom:20px">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">👥 멤버 관리 (${members.length}명)</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">${mHTML}</div>
      <div style="display:flex;gap:8px;margin-bottom:6px"><input id="new-id" class="inp" placeholder="아이디" style="flex:1"><input id="new-pw" class="inp" placeholder="비밀번호" style="flex:1"></div>
      <button id="add-member" class="btn bp" style="width:100%;padding:10px;font-size:13px">+ 멤버 추가</button></div>
    <div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">📋 문제집 관리</div>
      <div style="margin-bottom:10px">
        <select id="quiz-select" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--raised);color:var(--t);font-size:13px;outline:none;margin-bottom:8px">
          <option value="__new">➕ 새 문제집 추가</option>
          ${quizzes.map(q=>'<option value="'+q.id+'">✏️ '+q.title+' ('+q.count+'문제)</option>').join('')}
        </select>
      </div>
      <textarea id="adm-json" placeholder="JSON 붙여넣기...&#10;&#10;새 문제집: 그대로 붙여넣기&#10;기존 문제집: 선택 후 붙여넣으면 교체" style="width:100%;min-height:120px;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--raised);color:var(--t);font-size:12px;resize:vertical;outline:none;margin-bottom:8px"></textarea>
      <div id="adm-jerr" class="err"></div>
      <button id="adm-save-quiz" class="btn bp" style="width:100%;padding:10px;font-size:13px">☁️ 저장</button></div>
    <div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">🗑 문제집 삭제</div>${qHTML}</div>
  </div></div>`;
}
function bindAdmin(){
  $('#adm-back').onclick=()=>{S.screen='auth';currentUser=null;LC.del('currentUser');R()};
  $('#add-member').onclick=async()=>{
    const id=$('#new-id').value.trim(),pw=$('#new-pw').value.trim();
    if(!id||!pw){alert('아이디와 비밀번호 모두 입력하세요');return}
    const ms=membersLocal();if(ms.find(m=>m.id===id)){alert('이미 존재하는 아이디');return}
    ms.push({id,pw});await saveMembers(ms);R();
  };
  $$('.del-m').forEach(b=>{b.onclick=async()=>{const ms=membersLocal(),idx=+b.dataset.idx;if(!confirm(ms[idx].id+' 삭제?'))return;ms.splice(idx,1);await saveMembers(ms);R()}});
  $('#adm-save-quiz').onclick=async()=>{
    const jerr=$('#adm-jerr'),sel=$('#quiz-select').value;
    try{
      const p=JSON.parse($('#adm-json').value.trim());
      if(!p.questions?.length)throw new Error('questions 없음');
      jerr.style.display='none';
      const btn=$('#adm-save-quiz');btn.disabled=true;
      let ok;
      if(sel==='__new'){
        btn.textContent='새 문제집 업로드 중...';
        ok=await saveQuiz(p.title||'새 문제집',p.questions);
        if(ok)alert('새 문제집 업로드 완료! ('+p.questions.length+'문제)');
      }else{
        const old=quizListLocal().find(q=>q.id===sel);
        btn.textContent='"'+(old?old.title:'')+'" 수정 중...';
        ok=await updateQuiz(sel,p.title||(old?old.title:'문제집'),p.questions);
        if(ok)alert('문제집 수정 완료! ('+p.questions.length+'문제)');
      }
      if(!ok)alert('저장 실패');
      btn.disabled=false;btn.textContent='☁️ 저장';$('#adm-json').value='';R();
    }catch(e){jerr.style.display='block';jerr.textContent='❌ '+e.message}
  };
  $$('.del-quiz').forEach(b=>{b.onclick=async()=>{
    const qid=b.dataset.id,q=quizListLocal().find(x=>x.id===qid);
    if(!confirm('"'+(q?q.title:qid)+'" 삭제?'))return;b.textContent='삭제중...';b.disabled=true;
    await deleteQuiz(qid);alert('삭제 완료!');R();
  }});
}

// ═══ HOME ═══
function homeHTML(){
  const quizzes=quizListLocal(),history=uHist(),sessions=uSess(),wrongs=uWrongs(),stars=uStars();
  const wrongCount=Object.keys(wrongs).length,starCount=Object.keys(stars).length;

  const listHTML=quizzes.length?quizzes.map((q,i)=>{
    const sess=sessions[q.id],prog=sess?Math.round((sess.checked||[]).length/q.count*100):0;
    const past=history.filter(h=>h.quizId===q.id);
    const best=past.length?Math.max(...past.map(h=>Math.round(h.correct/h.total*100))):null;
    return`<div class="fu" style="animation-delay:${i*.04}s;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden">
      <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:11px;background:var(--prim);display:flex;align-items:center;justify-content:center;font-size:20px">✈️</div>
        <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${q.title}</div>
        <div style="color:var(--t2);font-size:12px;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap"><span>${q.count}문제</span>${best!==null?`<span style="color:var(--ok)">최고${best}%</span>`:''}${sess?`<span style="color:var(--warn)">진행${prog}%</span>`:''}</div></div></div>
      <div style="padding:0 12px 10px;display:flex;gap:6px;flex-wrap:wrap">
        ${sess?`<button class="btn bgh" data-resume="${q.id}" style="padding:7px 12px;font-size:11px;flex:1">▶ 이어서</button>`:''}
        <button class="btn bgh" data-start="${q.id}" style="padding:7px 12px;font-size:11px;flex:1">${sess?'↺ 처음부터':'▶ 시작'}</button>
      </div></div>`;
  }).join(''):'<div style="text-align:center;padding:40px;color:var(--t3)">문제집 없음</div>';

  // Special collections
  const specialHTML=`<div style="display:flex;gap:8px;margin-bottom:16px">
    <button id="btn-wrongs" class="btn bgh" style="flex:1;padding:12px;font-size:13px;flex-direction:column;gap:4px;border:1.5px solid ${wrongCount?'var(--bad)':'var(--bd)'}">
      <span style="font-size:20px">❌</span><span style="color:var(--bad);font-weight:800">${wrongCount}</span><span style="font-size:11px">오답 노트</span></button>
    <button id="btn-stars" class="btn bgh" style="flex:1;padding:12px;font-size:13px;flex-direction:column;gap:4px;border:1.5px solid ${starCount?'var(--warn)':'var(--bd)'}">
      <span style="font-size:20px">⭐</span><span style="color:var(--warn);font-weight:800">${starCount}</span><span style="font-size:11px">별표 모음</span></button></div>`;

  const histHTML=history.length?history.slice(0,30).map((h,i)=>{
    const d=new Date(h.date),ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    const pct=Math.round(h.correct/h.total*100);let gc='var(--ok)';if(pct<60)gc='var(--bad)';else if(pct<80)gc='var(--warn)';
    return`<div class="fu" style="animation-delay:${i*.03}s;display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:12px">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid ${gc};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:${gc}">${pct}%</div>
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.quizTitle||''}</div>
      <div style="color:var(--t2);font-size:11px;margin-top:2px">${h.correct}/${h.total} · ${fmt(h.time)} · ${ds}</div></div></div>`;
  }).join(''):'<div style="text-align:center;padding:40px;color:var(--t3)">기록 없음</div>';

  return`<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px"><div style="width:100%;max-width:560px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div><div style="font-size:13px;color:var(--t2)">환영합니다</div><div style="font-size:20px;font-weight:900">${currentUser}님 ✈️</div></div>
      <button id="logout" class="btn bgh" style="padding:8px 14px;font-size:12px">로그아웃</button></div>
    ${specialHTML}
    <div class="tabs" style="margin-bottom:16px"><div class="tab ${S.homeTab==='list'?'on':''}" data-ht="list">📚 문제집</div><div class="tab ${S.homeTab==='history'?'on':''}" data-ht="history">📊 기록</div></div>
    <div id="hl" style="display:${S.homeTab==='list'?'flex':'none'};flex-direction:column;gap:8px;margin-bottom:16px">${listHTML}</div>
    <div id="hh" style="display:${S.homeTab==='history'?'flex':'none'};flex-direction:column;gap:8px;margin-bottom:16px">${histHTML}</div>
    ${S.homeTab==='history'&&history.length?'<button id="clrh" class="btn bgh" style="width:100%;padding:10px;font-size:12px;color:var(--bad)">🗑 기록 삭제</button>':''}
  </div></div>`;
}
function bindHome(){
  $$('[data-ht]').forEach(t=>{t.onclick=()=>{S.homeTab=t.dataset.ht;R()}});
  $('#logout').onclick=()=>{currentUser=null;LC.del('currentUser');resetS();S.screen='auth';R()};
  const ch=$('#clrh');if(ch)ch.onclick=async()=>{if(confirm('기록 삭제?')){await saveU('hist',[]);R()}};
  $$('[data-start]').forEach(el=>{el.onclick=e=>{e.stopPropagation();startQuiz(el.dataset.start,false)}});
  $$('[data-resume]').forEach(el=>{el.onclick=e=>{e.stopPropagation();startQuiz(el.dataset.resume,true)}});
  $('#btn-wrongs').onclick=()=>startSpecial('wrongs');
  $('#btn-stars').onclick=()=>startSpecial('stars');
}

// ═══ START QUIZ ═══
async function startQuiz(qid,resume){
  const meta=quizListLocal().find(q=>q.id===qid);if(!meta)return;
  const questions=await loadQuizQ(qid);if(!questions.length){alert('문제 로드 실패');return}
  S.quizId=qid;S.mode='normal';S.cur=0;S.answers={};S.marks=new Set();S.checked=new Set();S.timer=0;
  if(resume){const ss=loadSess(qid);if(ss){S.cur=ss.cur;S.answers=ss.answers||{};S.marks=new Set(ss.marks||[]);S.checked=new Set(ss.checked||[]);S.timer=ss.timer||0;S.shuffleOrder=ss.shuffleOrder||shuffle(questions.map((_,i)=>i))}else{S.shuffleOrder=shuffle(questions.map((_,i)=>i))}}
  else{await clearSess(qid);S.shuffleOrder=shuffle(questions.map((_,i)=>i))}
  S.quiz={title:meta.title,questions:S.shuffleOrder.map(i=>({...questions[i],_qid:qid,_oidx:i}))};
  S.screen='quiz';R();startTimer();
}

async function startSpecial(type){
  const data=type==='wrongs'?uWrongs():uStars();
  const keys=Object.keys(data);if(!keys.length){alert(type==='wrongs'?'오답이 없습니다! 🎉':'별표 문제가 없습니다');return}
  // Group by quizId
  const byQuiz={};keys.forEach(k=>{const[qid,...rest]=k.split('_');const idx=parseInt(rest.join('_'));if(!byQuiz[qid])byQuiz[qid]=[];byQuiz[qid].push(idx)});
  // Load all needed quizzes
  let allQs=[];
  for(const qid of Object.keys(byQuiz)){
    const qs=await loadQuizQ(qid);const meta=quizListLocal().find(q=>q.id===qid);
    byQuiz[qid].forEach(idx=>{if(qs[idx])allQs.push({...qs[idx],_qid:qid,_oidx:idx,_from:meta?meta.title:'?'})});
  }
  if(!allQs.length){alert('문제를 불러올 수 없습니다');return}
  allQs=shuffle(allQs);
  S.quizId='__'+type;S.mode=type;S.cur=0;S.answers={};S.marks=new Set();S.checked=new Set();S.timer=0;S.shuffleOrder=null;
  S.quiz={title:type==='wrongs'?'❌ 오답 노트 ('+allQs.length+'문제)':'⭐ 별표 모음 ('+allQs.length+'문제)',questions:allQs};
  S.screen='quiz';R();startTimer();
}

// ═══ QUIZ (즉시 채점) ═══
function quizHTML(){
  const q=S.quiz.questions[S.cur],total=S.quiz.questions.length;
  const pct=(S.checked.size/total)*100;
  const correct=[...S.checked].filter(i=>S.answers[i]===S.quiz.questions[i].answer).length;
  const isChecked=S.checked.has(S.cur);
  const isStarred=q._qid?!!uStars()[q._qid+'_'+q._oidx]:false;

  const optsHTML=q.options.map((opt,idx)=>{
    const sel=S.answers[S.cur]===idx;let st='',ibg='var(--raised)',ic='var(--t3)',icon=String.fromCharCode(9312+idx);
    if(isChecked){if(idx===q.answer){st='border-color:var(--ok);background:var(--okm);color:var(--ok)';ibg='var(--ok)';ic='#fff';icon='✓'}
    else if(sel&&idx!==q.answer){st='border-color:var(--bad);background:var(--badm);color:var(--bad)';ibg='var(--bad)';ic='#fff';icon='✗'}}
    else if(sel){st='border-color:var(--pri);background:var(--prim);color:var(--pri)';ibg='var(--pri)';ic='#fff'}
    return`<button class="ob" data-i="${idx}" style="display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;border-radius:var(--r);background:var(--card);border:1.5px solid var(--bd);text-align:left;font-size:15px;line-height:1.7;touch-action:manipulation;font-weight:${sel?600:400};${st}${isChecked?';pointer-events:none':''}"><div style="min-width:32px;height:32px;border-radius:9px;background:${ibg};color:${ic};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">${icon}</div><span style="flex:1">${opt}</span></button>`;
  }).join('');

  let badge='',exp='';
  if(isChecked){
    badge=S.answers[S.cur]===q.answer
      ?'<div style="margin-top:14px;padding:12px;border-radius:12px;background:var(--okm);color:var(--ok);text-align:center;font-weight:800">✅ 정답!</div>'
      :'<div style="margin-top:14px;padding:12px;border-radius:12px;background:var(--badm);color:var(--bad);text-align:center;font-weight:800">❌ 오답</div>';
    if(q.explanation)exp=`<div style="margin-top:14px;padding:14px 16px;background:var(--prim);border-radius:var(--r);border:1px solid var(--bda)"><div style="color:var(--pri);font-weight:800;font-size:12px;margin-bottom:6px">💡 해설</div><div style="font-size:14px;line-height:1.8;white-space:pre-wrap">${q.explanation}</div></div>`;
  }
  // Source info
  let srcInfo='';if(q._from)srcInfo=`<div style="margin-top:8px;color:var(--t3);font-size:11px">출처: ${q._from}</div>`;

  const isLast=S.cur===total-1,allDone=S.checked.size===total;
  let bottomBtn;
  if(isChecked&&!isLast)bottomBtn=`<button id="bnxt" class="btn bp" style="flex:1;font-size:13px">다음 문제 ▶</button>`;
  else if(allDone)bottomBtn=`<button id="bfinish" class="btn bg" style="flex:1;font-size:13px">🏠 완료 (${correct}/${total})</button>`;
  else if(isChecked&&isLast)bottomBtn=`<button id="bfinish" class="btn bg" style="flex:1;font-size:13px">🏠 완료 (${correct}/${S.checked.size})</button>`;
  else bottomBtn=`<div style="flex:1;text-align:center;color:var(--t3);font-size:12px">답을 선택하세요</div>`;

  const navItems=S.quiz.questions.map((qi,i)=>{
    const done=S.checked.has(i),ic2=i===S.cur;let bg='var(--card)',bc='var(--bd)',tc='var(--t3)';
    if(done){if(S.answers[i]===qi.answer){bg='var(--okm)';bc='var(--ok)';tc='var(--ok)'}else{bg='var(--badm)';bc='var(--bad)';tc='var(--bad)'}}
    else if(ic2){bg='var(--prim)';bc='var(--pri)';tc='var(--pri)'}
    return`<button class="nq" data-g="${i}" style="aspect-ratio:1;border:2px solid ${bc};border-radius:8px;background:${bg};color:${tc};font-size:11px;font-weight:800">${i+1}</button>`;
  }).join('');

  return`<div style="min-height:100dvh;display:flex;flex-direction:column">
    <div style="background:var(--sf);border-bottom:1px solid var(--bd);padding:0 14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)">
      <div style="max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:50px">
        <div style="display:flex;align-items:center;gap:8px"><button id="bpause" style="width:30px;height:30px;border-radius:8px;background:var(--raised);display:flex;align-items:center;justify-content:center;font-size:13px;border:1px solid var(--bd)">⏸</button><span style="font-weight:700;font-size:12px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${S.quiz.title}</span></div>
        <div style="display:flex;align-items:center;gap:10px"><span style="color:var(--ok);font-size:12px;font-weight:700">${correct}✓</span><span style="color:var(--bad);font-size:12px;font-weight:700">${S.checked.size-correct}✗</span>
        <button id="bnav" style="background:var(--prim);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--pri)">${S.checked.size}/${total}</button></div></div>
      <div style="height:3px;background:var(--bd)"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--pri),var(--acc));transition:width .3s"></div></div></div>
    <div id="nov" style="display:none;position:fixed;inset:0;top:54px;z-index:99;background:rgba(0,0,0,.6)">
      <div style="max-width:500px;margin:0 auto;background:var(--sf);padding:16px;max-height:70dvh;overflow-y:auto;border:1px solid var(--bd);border-radius:0 0 16px 16px" onclick="event.stopPropagation()">
        <div style="font-weight:800;margin-bottom:10px">문제 목록</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:5px">${navItems}</div></div></div>
    <div style="flex:1;padding:20px 14px;max-width:860px;margin:0 auto;width:100%">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="background:var(--prim);color:var(--pri);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800">Q.${S.cur+1}/${total}</span>
        <button id="bmk" style="font-size:22px;padding:4px">${isStarred?'⭐':'☆'}</button></div>
      <div style="font-size:15px;font-weight:600;line-height:1.8;margin-bottom:22px;white-space:pre-wrap;word-break:keep-all">${q.question}</div>
      <div style="display:flex;flex-direction:column;gap:8px">${optsHTML}</div>${badge}${exp}${srcInfo}</div>
    <div style="background:var(--sf);border-top:1px solid var(--bd);padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom));position:sticky;bottom:0;z-index:50">
      <div style="max-width:860px;margin:0 auto;display:flex;gap:8px;align-items:center">
        <button id="bpv" class="btn bgh" style="padding:10px 14px;font-size:13px" ${S.cur===0?'disabled':''}>◀</button>
        ${bottomBtn}
        <button id="bskip" class="btn bgh" style="padding:10px 14px;font-size:13px" ${isLast?'disabled':''}>▶</button>
      </div></div></div>`;
}

function bindQuiz(){
  $$('.ob').forEach(b=>{b.onclick=async()=>{
    if(S.checked.has(S.cur))return;
    const q=S.quiz.questions[S.cur],ans=+b.dataset.i;
    S.answers[S.cur]=ans;S.checked.add(S.cur);
    // Update wrongs & stars
    if(q._qid!==undefined&&q._oidx!==undefined){
      const key=q._qid+'_'+q._oidx;
      const wrongs=uWrongs();
      if(ans===q.answer){delete wrongs[key]}else{wrongs[key]=true}
      await saveU('wrongs',wrongs);
    }
    saveSess();R();
  }});
  const bp=$('#bpv'),bs=$('#bskip');
  if(bp)bp.onclick=()=>{S.cur=Math.max(0,S.cur-1);R()};
  if(bs)bs.onclick=()=>{S.cur=Math.min(S.quiz.questions.length-1,S.cur+1);R()};
  const bnxt=$('#bnxt');if(bnxt)bnxt.onclick=()=>{S.cur++;R()};
  const bf=$('#bfinish');if(bf)bf.onclick=async()=>{
    stopTimer();
    const qs=S.quiz.questions;let correct=0;const wi=[];
    qs.forEach((q,i)=>{if(S.answers[i]===q.answer)correct++;else wi.push(q._oidx!==undefined?q._oidx:i)});
    const h=uHist();
    h.unshift({quizId:S.quizId,quizTitle:S.quiz.title,correct,total:qs.length,time:S.timer,date:Date.now(),mode:S.mode});
    if(h.length>100)h.length=100;
    await saveU('hist',h);if(S.quizId.startsWith('__')){}else{await clearSess(S.quizId)}
    resetS();S.screen='home';R();
  };
  // Star toggle
  $('#bmk').onclick=async()=>{
    const q=S.quiz.questions[S.cur];if(!q._qid)return;
    const key=q._qid+'_'+q._oidx,stars=uStars();
    if(stars[key])delete stars[key];else stars[key]=true;
    await saveU('stars',stars);R();
  };
  const nav=$('#nov');$('#bnav').onclick=()=>{nav.style.display=nav.style.display==='none'?'block':'none'};nav.onclick=()=>{nav.style.display='none'};
  $$('.nq').forEach(b=>{b.onclick=e=>{e.stopPropagation();S.cur=+b.dataset.g;nav.style.display='none';R()}});
  $('#bpause').onclick=()=>{if(confirm('일시정지?')){saveSess();stopTimer();resetS();S.screen='home';R()}};
  let tx=null;document.ontouchstart=e=>{tx=e.touches[0].clientX};document.ontouchend=e=>{if(tx===null)return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>60){if(d<0&&S.cur<S.quiz.questions.length-1){S.cur++;R()}else if(d>0&&S.cur>0){S.cur--;R()}}tx=null};
}

function resetS(){stopTimer();S.quiz=null;S.quizId=null;S.cur=0;S.answers={};S.marks=new Set();S.checked=new Set();S.timer=0;S.mode='normal';S.shuffleOrder=null}

// ═══ INIT ═══
async function init(){
  R(); // show loading
  // Timeout: if Firebase takes too long, go to auth anyway
  const timeout = new Promise(res => setTimeout(() => res('timeout'), 5000));
  const load = (async () => {
    try { await loadMembers(); await loadQuizList(); } catch(e) { console.warn('Init load error:', e); }
    if (currentUser) { try { await loadUserData(); } catch(e) { console.warn('User data error:', e); } }
    return 'done';
  })();
  await Promise.race([load, timeout]);
  S.screen = currentUser ? 'home' : 'auth';
  R();
}
init();
</script>
