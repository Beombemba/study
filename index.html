<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ATP CBT - Study Group</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0D13;--sf:#13161F;--raised:#1A1E2C;--card:#181C2A;--bd:#232840;--bda:#4E6AE6;--pri:#4E6AE6;--prig:rgba(78,106,230,.22);--prim:rgba(78,106,230,.10);--acc:#7C5CFC;--ok:#2DD4A0;--okm:rgba(45,212,160,.10);--bad:#F06464;--badm:rgba(240,100,100,.10);--warn:#F5B731;--warnm:rgba(245,183,49,.10);--t:#E6E9F0;--t2:#848BA2;--t3:#4E5468;--fn:'Noto Sans KR',-apple-system,sans-serif;--r:14px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}body{font-family:var(--fn);background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
button{font-family:var(--fn);cursor:pointer;border:none;background:none;color:inherit}input,textarea,select{font-family:var(--fn)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fu{animation:fadeUp .35s ease both}.si{animation:scaleIn .3s ease both}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:12px;font-size:15px;font-weight:700;transition:all .15s;touch-action:manipulation}
.bp{background:linear-gradient(135deg,var(--pri),var(--acc));color:#fff;box-shadow:0 4px 24px var(--prig)}
.bg{background:var(--ok);color:#fff}.bgh{background:var(--raised);color:var(--t2);border:1px solid var(--bd)}
.btn:disabled{opacity:.35;pointer-events:none}
.tabs{display:flex;gap:4px;background:var(--sf);padding:4px;border-radius:12px}
.tab{flex:1;padding:10px 12px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;color:var(--t3);transition:all .15s}.tab.on{background:var(--pri);color:#fff}
.inp{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--bd);background:var(--card);color:var(--t);font-size:15px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--pri)}
.err{margin-top:10px;padding:10px 14px;background:var(--badm);border-radius:10px;color:var(--bad);font-size:13px;font-weight:600;display:none}
.loader{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--pri);border-radius:50%;animation:spin .6s linear infinite}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px}
.sync-ok{background:var(--ok)}.sync-err{background:var(--bad)}.sync-ing{background:var(--warn);animation:spin .6s linear infinite}
</style>
</head>
<body>
<div id="app"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ═══════════════════
// FIREBASE INIT
// ═══════════════════
const firebaseConfig = {
  apiKey: "AIzaSyARciB7XP6ubjHdQkwBEKXI0-wsvbUeY-s",
  authDomain: "study-11efd.firebaseapp.com",
  projectId: "study-11efd",
  storageBucket: "study-11efd.firebasestorage.app",
  messagingSenderId: "967371236328",
  appId: "1:967371236328:web:d8ea1c12335b35928bfa5d",
  measurementId: "G-6HZHKC1B84"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_KEY = "rpj7646";

// ═══════════════════
// FIRESTORE DB LAYER
// ═══════════════════
const FDB = {
  async getDoc(collection, docId) {
    try {
      const snap = await db.collection(collection).doc(docId).get();
      return snap.exists ? snap.data() : null;
    } catch (e) { console.error('FDB get error:', e); return null; }
  },
  async setDoc(collection, docId, data) {
    try {
      await db.collection(collection).doc(docId).set(data, { merge: true });
      return true;
    } catch (e) { console.error('FDB set error:', e); return false; }
  },
  async deleteDoc(collection, docId) {
    try { await db.collection(collection).doc(docId).delete(); return true; }
    catch (e) { console.error('FDB del error:', e); return false; }
  },
  async getAllDocs(collection) {
    try {
      const snap = await db.collection(collection).get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) { console.error('FDB getAll error:', e); return []; }
  }
};

// ═══════════════════
// LOCAL CACHE + CLOUD SYNC
// ═══════════════════
const LC = {
  get(k) { try { return JSON.parse(localStorage.getItem('qf_' + k)) } catch { return null } },
  set(k, v) { try { localStorage.setItem('qf_' + k, JSON.stringify(v)) } catch {} },
  del(k) { try { localStorage.removeItem('qf_' + k) } catch {} }
};

let currentUser = LC.get('currentUser') || null;
let syncStatus = 'ok'; // ok, syncing, error

function uKey(k) { return 'u_' + currentUser + '_' + k; }

// Members
async function getMembers() {
  try {
    const cloud = await FDB.getDoc('app', 'members');
    if (cloud && cloud.list) { LC.set('members', cloud.list); return cloud.list; }
  } catch(e) { console.error('getMembers cloud error:', e); }
  return LC.get('members') || [];
}
async function setMembers(m) {
  LC.set('members', m);
  try { await FDB.setDoc('app', 'members', { list: m }); } catch(e) { console.error('setMembers error:', e); }
}
function getMembersLocal() { return LC.get('members') || []; }

// User data
async function getUserQuizzes() {
  if (!currentUser) return [];
  try {
    const cloud = await FDB.getDoc('users', currentUser + '_quizzes');
    if (cloud && cloud.data) { LC.set(uKey('quizzes'), cloud.data); return cloud.data; }
  } catch(e) { console.error('getUserQuizzes cloud error:', e); }
  let q = LC.get(uKey('quizzes'));
  if (!q || !q.length) { q = []; LC.set(uKey('quizzes'), q); }
  return q;
}
async function setUserQuizzes(q) {
  LC.set(uKey('quizzes'), q);
  try { await FDB.setDoc('users', currentUser + '_quizzes', { data: q }); } catch(e) { console.error('setUserQuizzes error:', e); }
}
function getUserQuizzesLocal() { return LC.get(uKey('quizzes')) || []; }

async function getUserHistory() {
  if (!currentUser) return [];
  try {
    const cloud = await FDB.getDoc('users', currentUser + '_history');
    if (cloud && cloud.data) { LC.set(uKey('history'), cloud.data); return cloud.data; }
  } catch(e) { console.error('getUserHistory cloud error:', e); }
  return LC.get(uKey('history')) || [];
}
async function setUserHistory(h) {
  LC.set(uKey('history'), h);
  try { await FDB.setDoc('users', currentUser + '_history', { data: h }); } catch(e) { console.error('setUserHistory error:', e); }
}

async function getUserSessions() {
  if (!currentUser) return {};
  try {
    const cloud = await FDB.getDoc('users', currentUser + '_sessions');
    if (cloud && cloud.data) { LC.set(uKey('sessions'), cloud.data); return cloud.data; }
  } catch(e) { console.error('getUserSessions cloud error:', e); }
  return LC.get(uKey('sessions')) || {};
}
async function setUserSessions(s) {
  LC.set(uKey('sessions'), s);
  try { await FDB.setDoc('users', currentUser + '_sessions', { data: s }); } catch(e) { console.error('setUserSessions error:', e); }
}

// ═══════════════════
// STATE
// ═══════════════════
let S = { screen: 'loading', quiz: null, quizIdx: -1, cur: 0, answers: {}, marks: new Set(), checked: new Set(), timer: 0, timerOn: false, timerRef: null, mode: 'normal', homeTab: 'list', adminTab: 'members' };

function startTimer() { S.timerOn = true; S.timerRef = setInterval(() => { S.timer++; const e = document.querySelector('#tmr'); if (e) e.textContent = fmt(S.timer) }, 1000) }
function stopTimer() { S.timerOn = false; clearInterval(S.timerRef) }
function fmt(s) { return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}` }

async function saveSession() {
  if (!S.quiz) return;
  const ss = LC.get(uKey('sessions')) || {};
  ss[S.quizIdx] = { cur: S.cur, answers: { ...S.answers }, marks: [...S.marks], checked: [...S.checked], timer: S.timer, date: Date.now(), shuffleOrder: S.shuffleOrder || [] };
  LC.set(uKey('sessions'), ss);
  try { await FDB.setDoc('users', currentUser + '_sessions', { data: ss }); } catch(e) { console.error('Session save error:', e); }
}
function loadSessionLocal(i) { return (LC.get(uKey('sessions')) || {})[i] || null; }
async function clearSession(i) {
  const ss = LC.get(uKey('sessions')) || {};
  delete ss[i];
  LC.set(uKey('sessions'), ss);
  await FDB.setDoc('users', currentUser + '_sessions', { data: ss });
}

setInterval(() => { if (S.screen === 'quiz') saveSession() }, 10000);
document.addEventListener('visibilitychange', () => { if (document.hidden && S.screen === 'quiz') saveSession() });

const $ = s => document.querySelector(s), $$ = s => document.querySelectorAll(s);

function R() {
  const a = $('#app');
  if (!currentUser && S.screen !== 'admin' && S.screen !== 'loading') { S.screen = 'auth'; }
  switch (S.screen) {
    case 'loading': a.innerHTML = loadingHTML(); break;
    case 'auth': a.innerHTML = authHTML(); bindAuth(); break;
    case 'admin': a.innerHTML = adminHTML(); bindAdmin(); break;
    case 'home': a.innerHTML = homeHTML(); bindHome(); break;
    case 'quiz': a.innerHTML = quizHTML(); bindQuiz(); break;
    case 'review': a.innerHTML = reviewHTML(); bindReview(); break;
  }
}

// ═══════════════════
// LOADING
// ═══════════════════
function loadingHTML() {
  return `<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px">
    <div style="display:inline-flex;align-items:center;gap:10px;background:var(--prim);padding:10px 22px;border-radius:50px">
      <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff">Q</div>
      <span style="font-weight:900;font-size:19px">ATP CBT</span></div>
    <div><span class="loader"></span> <span style="color:var(--t2);font-size:13px;margin-left:8px">클라우드 동기화 중...</span></div>
  </div>`;
}

// ═══════════════════
// AUTH
// ═══════════════════
function authHTML() {
  const members = getMembersLocal();
  const memberList = members.length ? members.map(m =>
    `<button class="member-btn fu" data-name="${m.name}" style="animation-delay:${members.indexOf(m) * .04}s;display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);text-align:left;transition:all .15s">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--prim);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--pri)">${m.name[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:15px">${m.name}</div>
      ${m.pw ? '<div style="color:var(--t3);font-size:11px">비밀번호 설정됨</div>' : '<div style="color:var(--warn);font-size:11px">첫 로그인 — 비번 설정 필요</div>'}</div>
      <span style="color:var(--t3);font-size:16px">›</span></button>`
  ).join('') : '<div style="text-align:center;padding:40px;color:var(--t3);font-size:14px;line-height:1.7">등록된 멤버가 없습니다<br><span style="font-size:12px">관리자에게 문의하세요</span></div>';

  return `<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="width:100%;max-width:440px">
      <div class="si" style="text-align:center;margin-bottom:32px">
        <div style="display:inline-flex;align-items:center;gap:10px;background:var(--prim);padding:10px 22px;border-radius:50px;margin-bottom:18px">
          <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:#fff">Q</div>
          <span style="font-weight:900;font-size:19px">ATP CBT</span></div>
        <h1 style="font-size:24px;font-weight:900;margin-bottom:6px">로그인</h1>
        <p style="color:var(--t2);font-size:13px">본인 이름을 선택하세요 <span style="color:var(--ok);font-size:11px">☁️ 클라우드 연동</span></p>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">${memberList}</div>
      <div id="pw-modal" style="display:none;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px">
        <div id="pw-title" style="font-weight:800;font-size:15px;margin-bottom:12px"></div>
        <input id="pw-input" class="inp" type="password" placeholder="비밀번호">
        <div id="pw-set" style="display:none;margin-top:8px"><input id="pw-confirm" class="inp" type="password" placeholder="비밀번호 확인" style="margin-bottom:8px"></div>
        <div id="pw-err" class="err"></div>
        <div style="display:flex;gap:8px;margin-top:12px"><button id="pw-cancel" class="btn bgh" style="flex:1;font-size:13px">취소</button><button id="pw-btn" class="btn bp" style="flex:1;font-size:13px">확인</button></div>
      </div>
      <button id="btn-admin" class="btn bgh" style="width:100%;padding:12px;font-size:13px;margin-top:8px">🔧 관리자</button>
    </div></div>`;
}

function bindAuth() {
  let selectedMember = null;
  $$('.member-btn').forEach(b => {
    b.onclick = () => {
      selectedMember = getMembersLocal().find(m => m.name === b.dataset.name);
      if (!selectedMember) return;
      const modal = $('#pw-modal'), title = $('#pw-title'), err = $('#pw-err'), setDiv = $('#pw-set');
      err.style.display = 'none';
      if (!selectedMember.pw) {
        title.textContent = `${selectedMember.name}님 — 비밀번호 설정`;
        setDiv.style.display = 'block';
      } else {
        title.textContent = `${selectedMember.name}님 — 로그인`;
        setDiv.style.display = 'none';
      }
      modal.style.display = 'block';
      $('#pw-input').value = '';
      const pc = $('#pw-confirm'); if (pc) pc.value = '';
      setTimeout(() => $('#pw-input').focus(), 100);
    };
  });

  $('#pw-btn').onclick = async () => {
    const err = $('#pw-err');
    if (!selectedMember) return;
    if (!selectedMember.pw) {
      const pw = $('#pw-input').value, pw2 = $('#pw-confirm').value;
      if (!pw || pw.length < 2) { err.textContent = '2자 이상 입력하세요'; err.style.display = 'block'; return; }
      if (pw !== pw2) { err.textContent = '비밀번호가 일치하지 않습니다'; err.style.display = 'block'; return; }
      const members = getMembersLocal();
      const m = members.find(x => x.name === selectedMember.name);
      if (m) m.pw = pw;
      await setMembers(members);
      currentUser = selectedMember.name;
      LC.set('currentUser', currentUser);
      S.screen = 'home'; R();
    } else {
      if ($('#pw-input').value === selectedMember.pw) {
        currentUser = selectedMember.name;
        LC.set('currentUser', currentUser);
        S.screen = 'home'; R();
      } else {
        err.textContent = '비밀번호가 틀렸습니다'; err.style.display = 'block';
      }
    }
  };

  $('#pw-input').onkeydown = (e) => { if (e.key === 'Enter') { if (selectedMember && selectedMember.pw) $('#pw-btn').click(); else $('#pw-confirm').focus(); } };
  const pc = $('#pw-confirm'); if (pc) pc.onkeydown = (e) => { if (e.key === 'Enter') $('#pw-btn').click(); };
  $('#pw-cancel').onclick = () => { $('#pw-modal').style.display = 'none'; selectedMember = null; };

  $('#btn-admin').onclick = () => {
    const pw = prompt('관리자 비밀번호를 입력하세요');
    if (pw === ADMIN_KEY) { S.screen = 'admin'; R(); }
    else if (pw !== null) alert('비밀번호가 틀렸습니다');
  };
}

// ═══════════════════
// ADMIN
// ═══════════════════
function adminHTML() {
  const members = getMembersLocal();
  const mHTML = members.length ? members.map((m, i) =>
    `<div class="fu" style="animation-delay:${i * .03}s;display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:12px">
      <div style="width:36px;height:36px;border-radius:50%;background:var(--prim);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--pri)">${m.name[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-weight:700;font-size:14px">${m.name}</div>
      <div style="color:var(--t3);font-size:11px">${m.pw ? '비번 설정됨' : '미설정'}</div></div>
      <button class="reset-pw" data-idx="${i}" style="padding:6px 10px;border-radius:7px;background:var(--warnm);color:var(--warn);font-size:11px;font-weight:600">비번초기화</button>
      <button class="del-m" data-idx="${i}" style="padding:6px 10px;border-radius:7px;background:var(--badm);color:var(--bad);font-size:11px;font-weight:600">삭제</button>
    </div>`
  ).join('') : '<div style="text-align:center;padding:30px;color:var(--t3)">멤버 없음</div>';

  // Collect all quiz titles from all members
  const allQuizTitles = new Set();
  members.forEach(m => {
    const qs = LC.get('u_' + m.name + '_quizzes') || [];
    qs.forEach(q => allQuizTitles.add(q.title));
  });
  const quizDelHTML = [...allQuizTitles].length ? [...allQuizTitles].map((t, i) =>
    `<div class="fu" style="animation-delay:${i * .03}s;display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--raised);border:1px solid var(--bd);border-radius:10px;margin-bottom:6px">
      <div style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</div>
      <button class="del-quiz-all" data-title="${t.replace(/"/g, '&quot;')}" style="padding:5px 10px;border-radius:7px;background:var(--badm);color:var(--bad);font-size:11px;font-weight:600;white-space:nowrap">삭제</button></div>`
  ).join('') : '<div style="text-align:center;padding:20px;color:var(--t3);font-size:12px">문제집 없음</div>';

  return `<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px">
    <div style="width:100%;max-width:500px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:20px;font-weight:900">🔧 관리자 패널 <span style="color:var(--ok);font-size:11px">☁️</span></h2>
        <button id="adm-back" class="btn bgh" style="padding:8px 14px;font-size:12px">← 돌아가기</button>
      </div>

      <div style="margin-bottom:20px">
        <div style="font-weight:700;font-size:14px;margin-bottom:10px">👥 멤버 관리 (${members.length}명)</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">${mHTML}</div>
        <div style="display:flex;gap:8px">
          <input id="new-name" class="inp" placeholder="새 멤버 이름" style="flex:1">
          <button id="add-member" class="btn bp" style="padding:10px 18px;font-size:13px;white-space:nowrap">+ 추가</button>
        </div>
      </div>

      <div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px">📋 문제집 추가 (JSON)</div>
        <textarea id="adm-json" placeholder="JSON 붙여넣기로 문제집 추가..." style="width:100%;min-height:100px;padding:12px;border-radius:10px;border:1.5px solid var(--bd);background:var(--raised);color:var(--t);font-size:12px;resize:vertical;outline:none;margin-bottom:8px"></textarea>
        <div id="adm-jerr" class="err"></div>
        <button id="adm-add-quiz" class="btn bp" style="width:100%;padding:10px;font-size:13px">전체 멤버에게 문제집 추가</button>
      </div>

      <div style="background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px">
        <div style="font-weight:700;font-size:14px;margin-bottom:8px">🗑 문제집 삭제 (전체 멤버)</div>
        <div style="color:var(--t2);font-size:11px;margin-bottom:10px">선택한 문제집을 모든 멤버에게서 삭제합니다</div>
        ${quizDelHTML}
      </div>
    </div>
  </div>`;
}

function bindAdmin() {
  $('#adm-back').onclick = () => { S.screen = 'auth'; currentUser = null; LC.del('currentUser'); R(); };

  $('#add-member').onclick = async () => {
    const name = $('#new-name').value.trim();

      const members = getMembersLocal();
      for (const m of members) {
        const prev = currentUser;
        currentUser = m.name;
        const qs = getUserQuizzesLocal();
        qs.unshift(quiz);
        await setUserQuizzes(qs);
        currentUser = prev;
      }
      alert(`${members.length}명 멤버에게 문제집 추가 완료! ☁️`);
      $('#adm-json').value = '';
      R();
    } catch (e) {
      $('#adm-jerr').style.display = 'block';
      $('#adm-jerr').textContent = '❌ ' + e.message;

  $$('.del-quiz-all').forEach(b => {

      if (!confirm(`"${title}" 문제집을 전체 멤버에게서 삭제할까요?`)) return;
      const members = getMembersLocal();
      let count = 0;
      for (const m of members) {
        const prev = currentUser;
        currentUser = m.name;
        const qs = getUserQuizzesLocal();
        const filtered = qs.filter(q => q.title !== title);
        if (filtered.length < qs.length) count++;

        // Clean up sessions
        const ss = LC.get(uKey('sessions')) || {};

        filtered.forEach((q, idx) => {
          const oldIdx = qs.findIndex(oq => oq.title === q.title);
          if (oldIdx !== -1 && ss[oldIdx]) newSs[idx] = ss[oldIdx];
        });
        await setUserSessions(newSs);
        currentUser = prev;
      }
      alert(`${count}명의 멤버에게서 "${title}" 삭제 완료! ☁️`);
      R();
    };
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}

function startQuiz(idx, mode, resume) {
  const q = getUserQuizzesLocal(); 
  const original = q[idx];
  S.quizIdx = idx; S.mode = mode;
  S.cur = 0; S.answers = {}; S.marks = new Set(); S.checked = new Set(); S.timer = 0;
  
  if (resume) {
    const ss = loadSessionLocal(idx);
    if (ss) { 
      S.cur = ss.cur; S.answers = ss.answers; S.marks = new Set(ss.marks); S.checked = new Set(ss.checked || []); S.timer = ss.timer;
      // Restore shuffle order from saved indices
      if (ss.shuffleOrder && ss.shuffleOrder.length) {
        S.quiz = { ...original, questions: ss.shuffleOrder.map(i => original.questions[i]) };
        S.shuffleOrder = ss.shuffleOrder;
      } else {
        S.quiz = { ...original };
        S.shuffleOrder = original.questions.map((_, i) => i);
      }
    } else {
      S.quiz = { ...original };
      S.shuffleOrder = original.questions.map((_, i) => i);
    }
  } else {
    // 새로 시작: 셔플 인덱스 생성
    const indices = original.questions.map((_, i) => i);
    S.shuffleOrder = shuffle(indices);
    S.quiz = { ...original, questions: S.shuffleOrder.map(i => original.questions[i]) };
  }
  S.screen = 'quiz'; R(); startTimer();
}

function startWrongReview(idx) {
  const q = getUserQuizzesLocal()[idx]; const h = LC.get(uKey('history')) || []; const wi = new Set();
  h.filter(x => x.quizTitle === q.title).forEach(x => { if (x.wrongIndices) x.wrongIndices.forEach(i => wi.add(i)) });
  if (!wi.size) { alert('틀린 문제가 없어요! 🎉'); return }
  const wq = shuffle([...wi].map(i => ({ ...q.questions[i], origIdx: i })).filter(Boolean));
  S.quiz = { title: q.title + ' (오답복습)', questions: wq }; S.quizIdx = idx; S.mode = 'review-wrong';
  S.cur = 0; S.answers = {}; S.marks = new Set(); S.checked = new Set(); S.timer = 0; S.screen = 'quiz'; R(); startTimer();
}

function bindQuiz() {
  // Answer selection → instant grade
  $$('.ob').forEach(b => {
    b.onclick = () => {
      if (S.checked.has(S.cur)) return; // already checked
      S.answers[S.cur] = +b.dataset.i;
      S.checked.add(S.cur);
      // Save wrong indices for history
      saveSession();
      R();
    };
  });

  const bp = $('#bpv'), bskip = $('#bskip');
  if (bp) bp.onclick = () => { S.cur = Math.max(0, S.cur - 1); R() };
  if (bskip) bskip.onclick = () => { S.cur = Math.min(S.quiz.questions.length - 1, S.cur + 1); R() };

  const bnxt = $('#bnxt');
  if (bnxt) bnxt.onclick = () => { S.cur = Math.min(S.quiz.questions.length - 1, S.cur + 1); R() };

  const bfinish = $('#bfinish');
  if (bfinish) bfinish.onclick = async () => {
    stopTimer();
    // Save history
    const qs = S.quiz.questions;
    let correct = 0; const wi = [];
    qs.forEach((q, i) => { if (S.answers[i] === q.answer) correct++; else wi.push(q.origIdx !== undefined ? q.origIdx : i) });
    const h = LC.get(uKey('history')) || [];
    h.unshift({ quizTitle: S.quiz.title.replace(' (오답복습)', ''), correct, total: qs.length, time: S.timer, date: Date.now(), wrongIndices: wi, mode: S.mode });
    if (h.length > 100) h.length = 100;
    await setUserHistory(h);
    await clearSession(S.quizIdx);
    resetS();
    S.screen = 'home'; R();
  };

  $('#bmk').onclick = () => { S.marks.has(S.cur) ? S.marks.delete(S.cur) : S.marks.add(S.cur); R() };
  const nav = $('#nov'); $('#bnav').onclick = () => { nav.style.display = nav.style.display === 'none' ? 'block' : 'none' }; nav.onclick = () => { nav.style.display = 'none' };
  $$('.nq').forEach(b => { b.onclick = e => { e.stopPropagation(); S.cur = +b.dataset.g; nav.style.display = 'none'; R() } });
  $('#bpause').onclick = () => { if (confirm('일시정지? 진행상황 자동저장됩니다.')) { saveSession(); stopTimer(); resetS(); S.screen = 'home'; R() } };
  let tx = null; document.ontouchstart = e => { tx = e.touches[0].clientX }; document.ontouchend = e => { if (tx === null) return; const d = e.changedTouches[0].clientX - tx; if (Math.abs(d) > 60) { if (d < 0 && S.cur < S.quiz.questions.length - 1) { S.cur++; R() } else if (d > 0 && S.cur > 0) { S.cur--; R() } } tx = null };
}

// ═══════════════════
function reviewHTML() {
  const qs = S.quiz.questions; const wrongs = qs.map((q, i) => ({ ...q, idx: i, user: S.answers[i] })).filter(q => q.user !== q.answer);
  const w = wrongs.length ? wrongs.map((q, i) => `<div class="fu" style="animation-delay:${i * .04}s;background:var(--sf);border-radius:14px;border:1px solid var(--bd);overflow:hidden">
    <button class="rtg" data-ri="${q.idx}" style="width:100%;padding:12px 14px;text-align:left;display:flex;align-items:flex-start;gap:10px">
      <span style="background:var(--badm);color:var(--bad);padding:2px 10px;border-radius:7px;font-size:11px;font-weight:800;flex-shrink:0">#${q.idx + 1}</span>
      <span style="flex:1;font-size:13px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${q.question}</span><span style="color:var(--t3);font-size:13px">▼</span></button>
    <div class="rd" data-rd="${q.idx}" style="display:none;padding:0 14px 12px">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        <span style="background:var(--badm);color:var(--bad);padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700">내 답: ${q.user !== undefined ? q.options[q.user] : '미응답'}</span>
        ${q.answer !== -1 ? `<span style="background:var(--okm);color:var(--ok);padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700">정답: ${q.options[q.answer]}</span>` : ''}</div>
      ${q.explanation ? `<div style="background:var(--prim);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.7"><strong style="color:var(--pri)">해설:</strong> ${q.explanation}</div>` : ''}</div></div>`).join('')
  : '<div style="text-align:center;padding:50px;background:var(--sf);border-radius:16px;border:1px solid var(--bd)"><div style="font-size:48px;margin-bottom:8px">🎉</div><div style="color:var(--ok);font-size:18px;font-weight:800">전문 만점!</div></div>';
  return `<div style="min-height:100dvh;padding:20px 14px"><div style="max-width:760px;margin:0 auto"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><div><h2 style="font-size:18px;font-weight:900">📝 오답 노트</h2><p style="color:var(--t2);font-size:12px;margin-top:3px">틀린 문제 ${wrongs.length}개</p></div><button id="bhm2" class="btn bgh" style="font-size:11px;padding:7px 12px">🏠 홈</button></div><div style="display:flex;flex-direction:column;gap:10px">${w}</div></div></div>`;
}
function bindReview() { $('#bhm2').onclick = () => { resetS(); S.screen = 'home'; R() }; $$('.rtg').forEach(b => { b.onclick = () => { const d = document.querySelector('[data-rd="' + b.dataset.ri + '"]'); d.style.display = d.style.display === 'none' ? 'block' : 'none'; b.querySelector('span:last-child').textContent = d.style.display === 'none' ? '▼' : '▲' } }) }

function resetS() { stopTimer(); S.quiz = null; S.quizIdx = -1; S.cur = 0; S.answers = {}; S.marks = new Set(); S.checked = new Set(); S.timer = 0; S.mode = 'normal' }

// ═══════════════════
// INIT - Load from Firebase then render
// ═══════════════════
async function init() {
  R(); // show loading
  try {
    // Load members from cloud
    const members = await getMembers();
    // If user was logged in, load their data
    if (currentUser) {
      await getUserQuizzes();
      await getUserHistory();
      await getUserSessions();
      S.screen = 'home';
    } else {
      S.screen = 'auth';
    }
  } catch (e) {
    console.error('Init error:', e);
    S.screen = 'auth';
  }
  R();
}

init();

</script>
</body>
</html>
